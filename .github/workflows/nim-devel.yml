name: Continuous Integration - development version

on:
  push:
    branches: [ master ]

jobs:

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container: ghcr.io/thindil/build:10

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Debug build
      run: |
        git config --global --add safe.directory /__w/steamsky/steamsky
        nimble debug -y

    - name: Run the tests
      run: others/tests.nims 30

    - name: Check with Nimalyzer
      run: /root/.nimble/bin/nimalyzer others/nimalyzer.cfg

    - name: Upload the log
      uses: actions/upload-artifact@v6
      if: failure()
      with:
         name: nimalyzer.log
         path: nimalyzer.log

  remove_old:
    if: ${{ always() }}
    needs: tests

    runs-on: ubuntu-latest
    timeout-minutes: 30

    - name: Delete release
        run: gh release delete $TAG -y
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build_linux:
    if: ${{ always() }}
    needs: remove_old

    runs-on: ubuntu-latest

    container: ghcr.io/thindil/build:10

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Build the program
      run: |
        git config --global --add safe.directory /__w/steamsky/steamsky
        others/build.nims linux

    - name: Compress the artifact
      run: tar -czf steamsky-development-linux.tar.gz release/steamsky-linux/

    - name: Upload to the nightly release
      uses: softprops/action-gh-release@v3
      with:
        files: steamsky-development-linux.tar.gz
        tag_name: nightly
        name: Nightly Development Release
        body: The daily development builds. Can be very unstable or buggy.
        prerelease: true

  build_windows:
    if: ${{ always() }}
    needs: build_linux

    runs-on: ubuntu-latest

    container: ghcr.io/thindil/buildwin64:10

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Build the program
      run: |
        git config --global --add safe.directory /__w/steamsky/steamsky
        apt-get update
        apt-get install -y gcc
        others/build.nims windows

    - name: Compress the artifact
      uses: montudor/action-zip@v1
      with:
        args: zip -qq -r steamsky-development-windows.zip release/steamsky-windows/

    - name: Upload to the nightly release
      uses: softprops/action-gh-release@v3
      with:
        files: steamsky-development-windows.zip
        tag_name: nightly
        name: Nightly Development Release
        body: The daily development builds. Can be very unstable or buggy.
        prerelease: true
