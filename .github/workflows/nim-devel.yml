name: Continuous Integration - development version

on:
  push:
    branches: [ master ]

jobs:

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container: ghcr.io/thindil/build:10

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Debug build
      run: |
        git config --global --add safe.directory /__w/steamsky/steamsky
        nimble debug -y

    - name: Run the tests
      run: others/tests.nims 30

    - name: Check with Nimalyzer
      run: /root/.nimble/bin/nimalyzer others/nimalyzer.cfg

    - name: Upload the log
      uses: actions/upload-artifact@v6
      if: failure()
      with:
         name: nimalyzer.log
         path: nimalyzer.log

  build_linux:

    if: ${{ always() }}
    needs: tests

    runs-on: ubuntu-latest

    container: ghcr.io/thindil/build:10

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Build the program
      run: |
        git config --global --add safe.directory /__w/steamsky/steamsky
        others/build.nims linux

    - name: Compress the artifact
      run: tar -cf steamsky-development-linux.tar -C release steamsky-linux

    - name: Upload the artifact
      uses: actions/upload-artifact@v6
      with:
         name: steamsky-development-linux.tar
         path: steamsky-development-linux.tar

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        files: steamsky-development-linux.tar
        tag_name: nightly
        name: Nightly Development Release
        body: The daily development builds. Can be very unstable or buggy.

  build_windows:

    if: ${{ always() }}
    needs: tests

    runs-on: ubuntu-latest

    container: ghcr.io/thindil/buildwin64:10

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Build the program
      run: |
        git config --global --add safe.directory /__w/steamsky/steamsky
        apt-get update
        apt-get install -y gcc
        others/build.nims windows

    - name: Compress the artifact
      run: tar -cf steamsky-development-windows.tar -C release steamsky-windows

    - name: Upload the artifact
      uses: actions/upload-artifact@v6
      with:
         name: steamsky-development-windows.tar
         path: steamsky-development-windows.tar

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        files: steamsky-development-windows.tar
        tag_name: nightly
        name: Nightly Development Release
        body: The daily development builds. Can be very unstable or buggy.
